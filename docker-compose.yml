version: '3.8'
services:
  backend:
    build:
      context: ./weatherapi/weatherapi
      dockerfile: Dockerfile
    image: nimbus-backend:latest
    ports:
      - "8080:8080"
    env_file:
      - /etc/nimbus.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    volumes:
      - /etc/nimbus:/etc/nimbus:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: nimbus-frontend:latest
    env_file:
      - /etc/nimbus.env
    restart: unless-stopped
