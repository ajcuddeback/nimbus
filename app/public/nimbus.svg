<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2547"/>
      <stop offset="100%" stop-color="#0d1024"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Cloud: three bumps + flat base fill -->
  <circle cx="10"   cy="15"   r="4.2" fill="white"/>
  <circle cx="17"   cy="12.5" r="5.8" fill="white"/>
  <circle cx="23.5" cy="15.5" r="3.8" fill="white"/>
  <rect x="7" y="15" width="19" height="5.5" rx="2.75" fill="white"/>

  <!-- Lightning bolt (overlaps cloud base, tip extends below) -->
  <polygon points="18,11 12,21 16.5,21 12,29 22,18 17.5,18" fill="#fbbf24"/>
</svg>
